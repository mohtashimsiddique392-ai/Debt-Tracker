kind = "web"
previewPath = "/"
title = "Debt Tracker"
version = "1.0.0"
id = "artifacts/debt-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25415

[services.development]
run = "pnpm --filter @workspace/debt-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/debt-tracker", "run", "build" ]
publicDir = "artifacts/debt-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25415"
BASE_PATH = "/"
